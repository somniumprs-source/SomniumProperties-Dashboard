<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo — Escolhe o tamanho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: Arial, sans-serif; color: white; }
    h1 { text-align: center; padding: 28px 0 8px; font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 3px; }
    p.sub { text-align: center; font-size: 12px; color: #333; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 0 24px 40px; max-width: 1200px; margin: 0 auto; }
    .option { border: 2px solid #1a1a1a; border-radius: 16px; overflow: hidden; transition: border-color 0.3s, transform 0.2s; }
    .option:hover { border-color: #C9A84C; transform: translateY(-2px); }
    .tag { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #111; border-bottom: 1px solid #1a1a1a; }
    .tag-name { font-size: 18px; font-weight: 800; color: #C9A84C; }
    .tag-size { font-size: 11px; color: #444; font-family: monospace; }
    .mock { background: #0d0d0d; display: flex; align-items: center; justify-content: center; padding: 32px 16px; min-height: 460px; }
    .card { width: 100%; max-width: 340px; }
    .logo-area { text-align: center; margin-bottom: 24px; }
    .logo-area img { display: block; margin: 0 auto; }
    .line { height: 1px; width: 100px; margin: 14px auto 0; background: linear-gradient(90deg, transparent, #C9A84C55, transparent); }
    .form { background: #111; border: 1px solid #1a1a1a; border-radius: 14px; padding: 28px; }
    .form h2 { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 18px; color: #eee; }
    .inp { width: 100%; height: 40px; border-radius: 8px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #222; color: #666; font-size: 12px; padding: 0 14px; }
    .btn { width: 100%; height: 40px; border-radius: 8px; margin-top: 6px; background: #C9A84C; border: none; font-weight: 700; font-size: 13px; color: #0d0d0d; cursor: pointer; }
    .foot { text-align: center; margin-top: 16px; font-size: 10px; color: #222; }
  </style>
</head>
<body>
  <h1>Escolhe o tamanho do logo</h1>
  <p class="sub">Clica na opção que preferes e diz-me a letra (A, B, C, D ou E)</p>
  <div class="grid" id="grid"></div>
  <script>
    const options = [
      { name: 'A', label: 'Compacto', px: 80 },
      { name: 'B', label: 'Médio', px: 110 },
      { name: 'C', label: 'Grande', px: 140 },
      { name: 'D', label: 'Extra Grande', px: 170 },
      { name: 'E', label: 'Máximo', px: 200 },
    ];
    const grid = document.getElementById('grid');
    options.forEach(o => {
      grid.innerHTML += `
        <div class="option">
          <div class="tag">
            <span class="tag-name">${o.name} — ${o.label}</span>
            <span class="tag-size">${o.px}px</span>
          </div>
          <div class="mock">
            <div class="card">
              <div class="logo-area">
                <img src="/logo-transparent.png" style="height:${o.px}px" alt="Logo">
                <div class="line"></div>
              </div>
              <div class="form">
                <h2>Acesso ao Dashboard</h2>
                <input class="inp" placeholder="somniumprs@gmail.com" readonly>
                <input class="inp" type="password" placeholder="••••••••" readonly>
                <button class="btn">Entrar</button>
              </div>
              <div class="foot">Somnium Properties © 2026</div>
            </div>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
